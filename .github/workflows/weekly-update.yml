name: Weekly album discovery

on:
  schedule:
    # Mondays 06:30 UTC — discover new releases and refresh provider links.
    - cron: "30 6 * * 1"
  workflow_dispatch:
    inputs:
      max_age_days:
        description: "Only consider Spotify releases newer than this many days"
        default: "90"
        required: false
      backfill_limit:
        description: "Existing entries to backfill with Apple Music links (0 = no limit)"
        default: "25"
        required: false

permissions:
  contents: write
  actions: write

concurrency:
  group: weekly-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Discover new releases and resolve Apple Music links
        run: >
          python3 scripts/discover_albums.py
          --max-age-days "${{ github.event.inputs.max_age_days || '90' }}"
          --reaudit
          --backfill-apple
          --backfill-limit "${{ github.event.inputs.backfill_limit || '25' }}"
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}

      - name: Rebuild generated site data
        run: python3 scripts/build.py --resolve-spotify-albums
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}

      - name: Validate static site
        run: python3 scripts/validate.py

      - name: Commit and push updates
        id: commit
        run: |
          git add data dist
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No catalog changes this week."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: weekly album discovery and provider link updates"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy updated site
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run pages.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
